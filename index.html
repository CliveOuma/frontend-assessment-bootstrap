<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Knowledge Club – Fourfront Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <!-- DESKTOP NAVBAR -->
    <nav class="desktop-navbar">
        <div class="nav-brand">
            <i class="bi bi-graph-up-arrow"></i>
            Fourfront <span>Management</span>
        </div>
        <ul class="desktop-nav-links">
            <li><a href="#" class="active"><i class="bi bi-house-fill"></i> Home</a></li>
            <li><a href="#"><i class="bi bi-bar-chart-line-fill"></i> Investments</a></li>
            <li><a href="#"><i class="bi bi-trophy-fill"></i> Leaderboard</a></li>
            <li><a href="#"><i class="bi bi-gear-fill"></i> Settings</a></li>
            <li><a href="#" class="nav-cta-btn" onclick="openModal(); return false;">
                    <i class="bi bi-patch-check-fill"></i> Join Membership
                </a></li>
        </ul>
    </nav>
    <!-- MOBILE NAVBAR -->
    <nav class="mobile-navbar">
        <div class="mobile-brand">
            <i class="bi bi-graph-up-arrow"></i>
            Fourfront <span>Management</span>
        </div>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="mobile-nav-menu" id="mobileNavMenu">
        <ul>
            <li><a href="#" onclick="closeMenu(event)"><i class="bi bi-house-fill"></i> Home</a></li>
            <li><a href="#" onclick="closeMenu(event)"><i class="bi bi-bar-chart-line-fill"></i> My Investments</a></li>
            <li><a href="#" onclick="openModal(); closeMenu(event)"><i class="bi bi-patch-check-fill"></i> Join
                    Membership</a></li>
            <li><a href="#" onclick="closeMenu(event)"><i class="bi bi-trophy-fill"></i> Leaderboard</a></li>
            <li><a href="#" onclick="closeMenu(event)"><i class="bi bi-gear-fill"></i> Settings</a></li>
            <li><a href="#" onclick="closeMenu(event)"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
